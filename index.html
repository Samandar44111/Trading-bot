<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Bot Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-luxon/1.3.1/chartjs-adapter-luxon.umd.min.js"></script>
<style>
:root[data-theme="dark"]{--bg:#0b0e14;--panel:#161b22;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--border:#30363d;--accent:#58a6ff;}
:root[data-theme="light"]{--bg:#f6f8fa;--panel:#ffffff;--text:#1f2328;--muted:#656d76;--green:#1a7f37;--red:#cf222e;--border:#d0d7de;--accent:#0969da;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;transition:background .3s,color .3s;-webkit-text-size-adjust:100%;}
.container{max-width:900px;margin:0 auto;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
h1{font-size:22px;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}
.theme-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:18px;cursor:pointer;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:640px){.grid{grid-template-columns:1fr;}h1{font-size:20px;}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;}
.card h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;}
.big{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;}
.status-line{display:flex;align-items:center;gap:8px;font-size:26px;font-weight:700;}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.label{color:var(--muted);font-size:13px;}
.value{font-size:13px;font-variant-numeric:tabular-nums;}
.up{color:var(--green);}.down{color:var(--red);}
.dot{width:10px;height:10px;border-radius:50%;}
.dot.live{background:var(--green);box-shadow:0 0 8px var(--green);}
.dot.stale{background:var(--red);}
.dot.unknown{background:var(--muted);}
.badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;text-transform:uppercase;}
.badge.long{background:rgba(63,185,80,.15);color:var(--green);}
.badge.flat{background:rgba(139,148,158,.15);color:var(--muted);}
.chart-card{margin-bottom:14px;}
.timeframes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tf{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.tf.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.chart-wrap{position:relative;height:300px;}
footer{color:var(--muted);font-size:11px;text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="container">
  <div class="top">
    <h1>🤖 BTC Bot Dashboard</h1>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="subtitle">Paper trading · RSI + EMA strategy</div>

  <div class="grid">
    <div class="card">
      <h2>BTC / USDT</h2>
      <div class="big" id="btc-price">—</div>
      <div class="row" style="margin-top:10px;"><span class="label">RSI</span><span class="value" id="rsi">—</span></div>
      <div class="row"><span class="label">Daily P/L</span><span class="value" id="pnl">—</span></div>
    </div>
    <div class="card">
      <h2>Bot Status</h2>
      <div class="status-line"><span class="dot unknown" id="status-dot"></span><span id="bot-state">Loading…</span></div>
      <div class="row" style="margin-top:10px;"><span class="label">Position</span><span class="value"><span class="badge flat" id="bot-position">—</span></span></div>
      <div class="row"><span class="label">Equity</span><span class="value" id="bot-equity">—</span></div>
      <div class="row"><span class="label">Updated</span><span class="value" id="bot-updated">—</span></div>
    </div>
  </div>

  <div class="card chart-card">
    <h2>Price Chart · Buy/Sell Markers</h2>
    <div class="timeframes" id="timeframes">
      <button class="tf" data-h="1">1H</button>
      <button class="tf" data-h="6">6H</button>
      <button class="tf active" data-h="24">1D</button>
      <button class="tf" data-h="168">1W</button>
      <button class="tf" data-h="0">All</button>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <footer>Live price + real trades from VM → GitHub · refreshes every 30s</footer>
</div>

<script>
const BASE="https://raw.githubusercontent.com/samandar44111/Trading-bot/main/";
const fmtUSD=n=>(n==null||isNaN(n))?"—":"$"+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=n=>(n==null||isNaN(n))?"—":(n>=0?"+":"")+Number(n).toFixed(2)+"%";
let chart, priceData=[], tradeData=[], currentHours=24;

function toggleTheme(){
  const r=document.documentElement;
  const next=r.getAttribute("data-theme")==="dark"?"light":"dark";
  r.setAttribute("data-theme",next);
  document.getElementById("theme-btn").textContent=next==="dark"?"🌙":"☀️";
  if(chart)renderChart();
}

async function loadStatus(){
  try{
    const r=await fetch(BASE+"status.json?t="+Date.now());
    const s=await r.json();
    document.getElementById("btc-price").textContent=fmtUSD(s.btc_price);
    document.getElementById("rsi").textContent=s.rsi!=null?s.rsi:"—";
    const pnlEl=document.getElementById("pnl");
    pnlEl.textContent=s.daily_profit_loss!=null?(s.daily_profit_loss>=0?"+":"")+s.daily_profit_loss+" USDT":"—";
    pnlEl.className="value "+((s.daily_profit_loss||0)>=0?"up":"down");
    const ageSec=(Date.now()-new Date(s.updated_at).getTime())/1000;
    document.getElementById("status-dot").className="dot "+(ageSec<180?"live":"stale");
    document.getElementById("bot-state").textContent=ageSec>=180?"Stale":(s.running?"Active":"Stopped");
    const posEl=document.getElementById("bot-position");
    posEl.textContent=s.position||"FLAT";
    posEl.className="badge "+((s.position||"flat").toLowerCase());
    document.getElementById("bot-equity").textContent=fmtUSD(s.equity);
    document.getElementById("bot-updated").textContent=new Date(s.updated_at).toLocaleString();
  }catch(e){
    document.getElementById("bot-state").textContent="Waiting…";
  }
}

async function loadChartData(){
  try{
    const [ph,tr]=await Promise.all([
      fetch(BASE+"price_history.json?t="+Date.now()).then(r=>r.json()).catch(()=>[]),
      fetch(BASE+"trades.json?t="+Date.now()).then(r=>r.json()).catch(()=>[])
    ]);
    priceData=ph.map(d=>({x:new Date(d.t).getTime(),y:d.p}));
    tradeData=tr.map(d=>({x:new Date(d.t.replace(" ","T")).getTime(),y:d.price,side:d.side,pnl:d.pnl}));
    renderChart();
  }catch(e){console.log("chart load error",e);}
}

function renderChart(){
  const css=getComputedStyle(document.documentElement);
  const text=css.getPropertyValue("--text").trim();
  const muted=css.getPropertyValue("--muted").trim();
  const border=css.getPropertyValue("--border").trim();
  const green=css.getPropertyValue("--green").trim();
  const red=css.getPropertyValue("--red").trim();
  const accent=css.getPropertyValue("--accent").trim();

  let pd=priceData, td=tradeData;
  if(currentHours>0){
    const cutoff=Date.now()-currentHours*3600*1000;
    pd=priceData.filter(d=>d.x>=cutoff);
    td=tradeData.filter(d=>d.x>=cutoff);
  }

  const buys=td.filter(t=>t.side==="BUY");
  const sells=td.filter(t=>t.side==="SELL");

  if(chart)chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{datasets:[
      {label:"BTC",data:pd,borderColor:accent,backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:.1},
      {label:"Buy",data:buys,showLine:false,pointStyle:"triangle",pointRadius:8,pointBackgroundColor:green,pointBorderColor:green},
      {label:"Sell",data:sells,showLine:false,pointStyle:"triangle",rotation:180,pointRadius:8,pointBackgroundColor:red,pointBorderColor:red}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:"nearest",intersect:false},
      plugins:{
        legend:{labels:{color:text,usePointStyle:true,boxWidth:8}},
        tooltip:{callbacks:{label:function(ctx){
          const v="$"+Number(ctx.parsed.y).toLocaleString();
          if(ctx.dataset.label==="Buy")return "BUY @ "+v;
          if(ctx.dataset.label==="Sell"){const p=ctx.raw.pnl;return "SELL @ "+v+(p?" ("+(p>=0?"+":"")+p+" USDT)":"");}
          return v;
        }}}
      },
      scales:{
        x:{type:"time",time:{tooltipFormat:"DD T"},ticks:{color:muted,maxTicksLimit:6},grid:{color:border}},
        y:{ticks:{color:muted,callback:v=>"$"+v.toLocaleString()},grid:{color:border}}
      }
    }
  });
}

document.getElementById("timeframes").addEventListener("click",e=>{
  if(!e.target.dataset.h)return;
  document.querySelectorAll(".tf").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  currentHours=parseInt(e.target.dataset.h);
  renderChart();
});

loadStatus();loadChartData();
setInterval(loadStatus,30000);
setInterval(loadChartData,60000);
</script>
</body>
</html>
