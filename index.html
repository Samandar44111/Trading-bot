<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Bot Dashboard</title>
<style>
body{font-family:-apple-system,system-ui,sans-serif;background:#0b0e14;color:#e6edf3;padding:16px;}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px;margin-bottom:14px;}
h1{font-size:22px;}
.big{font-size:32px;font-weight:600;}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #30363d;}
.label{color:#8b949e;font-size:13px;}
#debug{background:#2d1b1b;color:#f85149;padding:12px;border-radius:8px;font-size:12px;font-family:monospace;white-space:pre-wrap;word-break:break-all;margin-bottom:14px;}
.up{color:#3fb950;}.down{color:#f85149;}
</style>
</head>
<body>
<h1>🤖 BTC Bot Dashboard</h1>
<div id="debug">Starting…</div>
<div class="card">
  <h2>BTC / USDT</h2>
  <div class="big" id="btc-price">—</div>
</div>
<div class="card">
  <h2>Bot Status</h2>
  <div class="big" id="bot-state">Loading…</div>
  <div class="row"><span class="label">Position</span><span id="bot-position">—</span></div>
  <div class="row"><span class="label">Equity</span><span id="bot-equity">—</span></div>
  <div class="row"><span class="label">Updated</span><span id="bot-updated">—</span></div>
</div>

<script>
const STATUS_URL="https://raw.githubusercontent.com/samandar44111/Trading-bot/main/status.json";
const dbg=document.getElementById("debug");
const fmtUSD=n=>(n==null||isNaN(n))?"—":"$"+Number(n).toLocaleString();

async function update(){
  try{
    dbg.textContent="Fetching status.json…";
    const r=await fetch(STATUS_URL+"?t="+Date.now());
    dbg.textContent="HTTP status: "+r.status;
    if(!r.ok)throw new Error("HTTP "+r.status);
    const txt=await r.text();
    dbg.textContent="Got "+txt.length+" chars. Parsing…";
    const s=JSON.parse(txt);
    dbg.textContent="✓ Parsed OK. btc_price="+s.btc_price+" updated_at="+s.updated_at;
    document.getElementById("btc-price").textContent=fmtUSD(s.btc_price);
    document.getElementById("bot-state").textContent=s.running?"Active":"Stopped";
    document.getElementById("bot-position").textContent=s.position||"—";
    document.getElementById("bot-equity").textContent=fmtUSD(s.equity);
    document.getElementById("bot-updated").textContent=new Date(s.updated_at).toLocaleString();
  }catch(e){
    dbg.textContent="❌ ERROR: "+e.message+"\n\nThis is why it won't load.";
  }
}
update();
setInterval(update,10000);
</script>
</body>
</html>
